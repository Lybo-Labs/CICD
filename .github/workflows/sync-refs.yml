# ──────────────────────────────────────────────────────────────────────────────
# Auto-sync: updates workflow SHA references in consumer repos
# ──────────────────────────────────────────────────────────────────────────────
# When a push lands on main in this repo (cicd), this workflow opens PRs
# in all consumer repos updating the pinned SHA to the latest commit.
# ──────────────────────────────────────────────────────────────────────────────

name: Sync workflow refs

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - LYBO-API-CRM
          # Add more consumer repos here:
          # - another-repo
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.CICD_APP_ID }}
          private-key: ${{ secrets.CICD_APP_PRIVATE_KEY }}
          owner: Lybo-Labs
          repositories: ${{ matrix.repo }}

      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          repository: Lybo-Labs/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Update SHA references
        env:
          NEW_SHA: ${{ github.sha }}
        run: |
          # Find all workflow files referencing Lybo-Labs/cicd and update the SHA
          find .github/workflows -name '*.yml' -exec sed -i \
            "s|Lybo-Labs/cicd/\(.*/[^@]*\)@[0-9a-f]\{40\}\(.*\)|Lybo-Labs/cicd/\1@${NEW_SHA}\2|g" {} +

          # Check if there are changes
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi

          git diff --stat

      - name: Create PR
        if: success()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_SHA: ${{ github.sha }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          if git diff --quiet; then
            exit 0
          fi

          BRANCH="chore/update-cicd-ref-${NEW_SHA:0:7}"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/
          git commit -m "chore(ci): update cicd workflow ref to ${NEW_SHA:0:7}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(ci): update cicd workflow ref to ${NEW_SHA:0:7}" \
            --body "Auto-generated by [cicd sync workflow](https://github.com/Lybo-Labs/cicd/commit/${NEW_SHA}).

          Updates pinned SHA references to \`${NEW_SHA}\`." \
            --base main \
            --head "$BRANCH"
