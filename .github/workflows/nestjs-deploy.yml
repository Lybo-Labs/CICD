# ──────────────────────────────────────────────────────────────────────────────
# Reusable workflow: NestJS Backend Deploy (Docker Compose)
# ──────────────────────────────────────────────────────────────────────────────
# Lives in: Lybo-Labs/cicd/.github/workflows/nestjs-deploy.yml
#
# Strategy: Trunk-Based Development
#   - PR to main → test + build validation (via nestjs-ci.yml)
#   - Manual dispatch → deploy to development / staging / production
#   - Production requires a tag (validated by caller)
#
# Deploys using Docker Compose on a self-hosted runner (lybo-onpremise).
# The app is then exposed via Nginx Proxy Manager.
#
# Caller repos invoke it with:
#   uses: Lybo-Labs/cicd/.github/workflows/nestjs-deploy.yml@main
# ──────────────────────────────────────────────────────────────────────────────

name: NestJS Deploy

on:
  workflow_call:
    inputs:
      app-name:
        description: 'Application name (used for container and project naming)'
        required: true
        type: string
      port:
        description: 'Host port to expose the backend on'
        required: false
        type: string
        default: '3000'
      environment:
        description: 'GitHub Environment (production | staging | development)'
        required: true
        type: string
      deploy-dir:
        description: 'Absolute path on the server where the app is deployed'
        required: true
        type: string
    secrets:
      POSTGRES_PASSWORD:
        description: 'PostgreSQL password'
        required: true

jobs:
  deploy:
    runs-on: self-hosted
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          mkdir -p ${{ inputs.deploy-dir }}

      - name: Sync project files
        run: |
          rsync -a --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'postgres-data' \
            --exclude '.env' \
            ./ ${{ inputs.deploy-dir }}/

      - name: Write .env file
        shell: bash
        run: |
          # URL-encode the password for safe use in DATABASE_URL
          ENCODED_PASS=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ secrets.POSTGRES_PASSWORD }}', safe=''))")

          cat > ${{ inputs.deploy-dir }}/.env << EOF
          APP_ENV=${{ inputs.environment }}
          BACKEND_PORT=${{ inputs.port }}
          POSTGRES_USER=${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          POSTGRES_PORT=${{ vars.POSTGRES_PORT }}
          ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}
          DATABASE_URL=postgresql://${{ vars.POSTGRES_USER }}:${ENCODED_PASS}@db:5432/${{ vars.POSTGRES_DB }}?schema=public
          EOF
          sed -i 's/^[[:space:]]*//' ${{ inputs.deploy-dir }}/.env

      - name: Build and deploy containers
        working-directory: ${{ inputs.deploy-dir }}
        run: |
          docker compose -p ${{ inputs.app-name }}-${{ inputs.environment }} down --remove-orphans || true
          docker compose -p ${{ inputs.app-name }}-${{ inputs.environment }} up -d --build

      - name: Wait for healthy containers
        working-directory: ${{ inputs.deploy-dir }}
        run: |
          echo "Waiting for containers to be healthy..."
          timeout 60 bash -c '
            until docker compose -p ${{ inputs.app-name }}-${{ inputs.environment }} ps --format json | \
              grep -q "running"; do
              sleep 2
            done
          '

      - name: Health check
        run: |
          echo "Waiting for app to respond on port ${{ inputs.port }}..."
          timeout 90 bash -c '
            until curl -sf http://localhost:${{ inputs.port }}/ > /dev/null 2>&1; do
              sleep 3
            done
          ' || (docker compose -p ${{ inputs.app-name }}-${{ inputs.environment }} logs --tail=50 && exit 1)
          echo "✅ App is healthy"

      - name: Cleanup old images
        run: |
          docker image prune -f
